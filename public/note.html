<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noteshalla | Note Details</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <nav class="navbar glass-panel" style="margin: 1rem 5%; border-radius: 12px;">
        <a href="/" class="brand">Noteshalla</a>
        <div class="nav-links">
            <span id="wallet-display" style="display: none; color: var(--success); font-weight: 700;">Wallet: $0.00</span>
            <a href="/login.html" class="guest-only">Login</a>
            <a href="/signup.html" class="btn btn-primary guest-only">Sign Up</a>
            <a href="/dashboard.html" class="auth-only" style="display: none;">Dashboard</a>
            <a href="#" id="logout-btn" class="auth-only" style="display: none;">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container" style="display: block; max-width: 1200px; margin: 0 auto;">
        <div id="note-details-container" style="display: grid; grid-template-columns: 1fr 350px; gap: 2rem;">
            <!-- Main Content -->
            <div>
                <div class="glass-panel" style="padding: 2.5rem;">
                    <div class="badges" id="nd-badges"></div>
                    <h1 id="nd-title" style="margin-bottom: 0.5rem; color: white;">Loading Note...</h1>
                    <div style="color: var(--text-muted); margin-bottom: 2rem;" id="nd-seller"></div>
                    
                    <h3 style="margin-bottom: 0.5rem; color: white;">Description</h3>
                    <p id="nd-desc" style="color: var(--text-muted); margin-bottom: 2.5rem; white-space: pre-wrap; font-size: 1.05rem;"></p>

                    <h3 style="margin-bottom: 0.5rem; color: white;">Tags</h3>
                    <div class="badges" id="nd-tags" style="margin-bottom: 2.5rem;"></div>

                    <div id="preview-section" style="display: none;">
                        <h3 style="margin-bottom: 0.5rem; color: white;">Preview</h3>
                        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">Showing the first page of the PDF.</p>
                        <div style="border: 1px solid var(--glass-border); border-radius: 8px; overflow: hidden;">
                            <iframe id="pdf-preview" style="width: 100%; height: 600px; border: none; display: block;"></iframe>
                        </div>
                    </div>
                </div>

                <!-- Reviews -->
                <div class="glass-panel" style="padding: 2.5rem; margin-top: 2rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h2 style="color: white;">Reviews</h2>
                        <div id="avg-rating" style="font-size: 1.25rem; font-weight: 700; color: var(--warning);"></div>
                    </div>
                    
                    <div id="add-review-section" style="display: none; margin-bottom: 2rem; padding: 1.5rem; background: rgba(255,255,255,0.05); border-radius: 8px;">
                        <h4 style="margin-bottom: 1rem; color: var(--accent-color);">Write a Review</h4>
                        <div class="form-group">
                            <label>Rating (1-5)</label>
                            <input type="number" id="rev-rating" min="1" max="5" class="form-control" value="5">
                        </div>
                        <div class="form-group">
                            <label>Comment</label>
                            <textarea id="rev-comment" class="form-control" rows="3"></textarea>
                        </div>
                        <button class="btn btn-primary" id="submit-review-btn">Submit Review</button>
                    </div>

                    <div id="reviews-list"></div>
                </div>
            </div>

            <!-- Sidebar Action Panel -->
            <div>
                <div class="glass-panel" style="padding: 2rem; position: sticky; top: 100px;">
                    <div style="font-size: 3.5rem; font-weight: 800; color: var(--success); margin-bottom: 0.5rem; line-height: 1;" id="sidebar-price"></div>
                    <div style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">One-time purchase for lifetime access.</div>
                    
                    <div id="action-wrapper" style="display: flex; flex-direction: column; gap: 1rem;">
                        <!-- Buttons injected via JS -->
                    </div>

                    <hr style="border: none; border-top: 1px solid var(--glass-border); margin: 2rem 0;">
                    
                    <button class="btn btn-outline" style="width: 100%; border-color: var(--glass-border); color: var(--text-muted);" id="wishlist-btn">
                        <span style="font-size: 1.2rem; margin-right: 5px;">♥</span> Add to Wishlist
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/note.js"></script>
</body>
<footer class="site-footer">
    <p>© 2026 NoteShalla. Built by Shrajal Mishra.</p>
</footer>
</html>
