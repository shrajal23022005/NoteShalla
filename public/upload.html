<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noteshalla | Upload Note</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <nav class="navbar glass-panel" style="margin: 1rem 5%; border-radius: 12px;">
        <a href="/" class="brand">Noteshalla</a>
        <div class="nav-links">
            <a href="/dashboard.html" class="auth-only" style="display: none;">Dashboard</a>
            <a href="#" id="logout-btn" class="auth-only" style="display: none;">Logout</a>
        </div>
    </nav>

    <div class="auth-container glass-panel" style="max-width: 600px; margin-top: 2rem;">
        <h2 style="color: var(--primary-color);">Upload a Note</h2>
        <form id="upload-form">
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="up-title" class="form-control" required>
            </div>
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex:1">
                    <label>Subject</label>
                    <input type="text" id="up-subject" class="form-control" required>
                </div>
                <div class="form-group" style="flex:1">
                    <label>Level</label>
                    <select id="up-level" class="form-control">
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                </div>
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex:1">
                    <label>Language</label>
                    <select id="up-language" class="form-control">
                        <option value="English">English</option>
                        <option value="Hindi">Hindi</option>
                        <option value="Hinglish">Hinglish</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1">
                    <label>Price ($)</label>
                    <input type="number" step="0.01" id="up-price" class="form-control" required min="0">
                </div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="up-desc" class="form-control" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label>Tags (Comma separated)</label>
                <input type="text" id="up-tags" class="form-control" placeholder="e.g. DSA, arrays, interview">
            </div>

            <div class="form-group" style="display:flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="up-preview" checked style="width:16px; height: 16px;">
                <label style="margin: 0; font-weight: 600;">Enable Preview (First Page)</label>
            </div>

            <div class="form-group" style="margin-top: 1rem;">
                <label>PDF File</label>
                <input type="file" id="up-file" class="form-control" accept="application/pdf" required style="padding: 0.5rem 1rem;">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="upload-btn">Upload Note</button>
        </form>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/upload.js"></script>
</body>
<footer class="site-footer">
    <p>© 2026 NoteShalla. Built by Shrajal Mishra.</p>
</footer>
</html>
