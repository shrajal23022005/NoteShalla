<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noteshalla | Sign Up</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <nav class="navbar glass-panel" style="margin: 1rem 5%; border-radius: 12px;">
        <a href="/" class="brand">Noteshalla</a>
    </nav>

    <div class="auth-container glass-panel">
        <h2 style="color: var(--primary-color);">Create an Account</h2>
        <form id="signup-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.95rem;">
            Already have an account? <a href="/login.html" style="color: var(--primary-color); font-weight: 600;">Login</a>
        </p>
    </div>

    <script src="/js/main.js"></script>
</body>
<footer class="site-footer">
    <p>© 2026 NoteShalla. Built by Shrajal Mishra.</p>
</footer>
</html>
